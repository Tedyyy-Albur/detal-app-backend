version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: dental-db
    restart: always
    environment:
      POSTGRES_DB: dental_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dental_postgres_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dental_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dental-app
    restart: always
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=dental_db
      - DB_USER=postgres
      - DB_PASSWORD=dental_postgres_pass
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
